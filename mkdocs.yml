site_name: SOC Standard Operating Procedures
site_description: Vendor-agnostic SOC Standard Operating Procedures — Bilingual (EN/TH)
site_author: Nutthakorn Chalaemwongwan [Pop]
site_url: https://nutthakorn7.github.io/SOC-SOP/
repo_url: https://github.com/nutthakorn7/SOC-SOP
repo_name: SOC-SOP
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
    logo: material/shield-lock
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nutthakorn7/SOC-Standard-Operating-Procedures
    - icon: fontawesome/brands/line
      link: https://line.me/R/ti/p/@cyberdefense
  generator: false

copyright: Built with ❤️ by <a href="https://cyberdefense.co.th">cyberdefense.co.th</a> | Line OA - @cyberdefense

