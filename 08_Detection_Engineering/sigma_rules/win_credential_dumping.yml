title: Credential Dumping Activity Detected
id: auto-generated
status: experimental
description: >
    Detects credential dumping techniques including LSASS memory access,
    SAM database extraction, and DCSync replication requests
references:
    - https://attack.mitre.org/techniques/T1003/
author: SOC Team
date: 2026/03/06
tags:
    - attack.credential_access
    - attack.t1003.001
    - attack.t1003.002
    - attack.t1003.003
logsource:
    product: windows
    category: process_creation
detection:
    selection_lsass:
        TargetImage|endswith: '\lsass.exe'
        GrantedAccess|contains:
            - '0x1010'
            - '0x1038'
            - '0x1fffff'
    selection_tools:
        CommandLine|contains:
            - 'mimikatz'
            - 'sekurlsa'
            - 'lsadump'
            - 'procdump'
            - 'comsvcs.dll'
            - 'MiniDump'
    selection_dcsync:
        CommandLine|contains:
            - 'DCSync'
            - 'DRS GetNCChanges'
            - 'lsadump::dcsync'
    condition: selection_lsass or selection_tools or selection_dcsync
falsepositives:
    - Legitimate security tools performing credential audits
    - Authorized penetration testing
level: critical
