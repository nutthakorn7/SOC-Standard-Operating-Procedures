title: Wiper or Destructive Malware Activity
id: auto-generated
status: experimental
description: >
    Detects destructive wiper malware indicators including MBR overwrite attempts,
    mass file deletion, volume shadow copy destruction, and disk wiping tools
references:
    - https://attack.mitre.org/techniques/T1485/
    - https://attack.mitre.org/techniques/T1561/
author: SOC Team
date: 2026/03/06
tags:
    - attack.impact
    - attack.t1485
    - attack.t1561.001
    - attack.t1561.002
logsource:
    product: windows
    category: process_creation
detection:
    selection_shadow:
        CommandLine|contains:
            - 'vssadmin delete shadows'
            - 'wmic shadowcopy delete'
            - 'bcdedit /set {default} recoveryenabled no'
            - 'wbadmin delete catalog'
    selection_wipe:
        CommandLine|contains:
            - 'cipher /w'
            - 'format c: /y'
            - 'sdelete'
            - 'dd if=/dev/zero'
    selection_mbr:
        CommandLine|contains:
            - '\\\\.\\PhysicalDrive'
            - 'MBR'
    condition: selection_shadow or selection_wipe or selection_mbr
falsepositives:
    - Legitimate disk cleanup or decommissioning
    - Authorized data sanitization
level: critical
