title: Living Off The Land Binary Execution
id: auto-generated
status: experimental
description: >
    Detects execution of commonly abused LOLBins for download, execution,
    or proxy execution of malicious payloads
references:
    - https://attack.mitre.org/techniques/T1218/
    - https://lolbas-project.github.io/
author: SOC Team
date: 2026/03/06
tags:
    - attack.defense_evasion
    - attack.t1218
    - attack.t1218.005
    - attack.t1218.011
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        CommandLine|contains:
            - 'certutil -urlcache'
            - 'certutil -decode'
            - 'mshta vbscript'
            - 'mshta javascript'
            - 'mshta http'
            - 'rundll32 javascript'
            - 'regsvr32 /s /n /u /i:http'
            - 'cmstp /ni /s'
            - 'msiexec /q /i http'
            - 'forfiles /p c:\windows'
            - 'pcalua -a'
            - 'msdt /id'
    condition: selection
falsepositives:
    - Legitimate administrative use of system tools
    - Software installation scripts
level: high
